name: Flutter Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'flutter/**'
      - '.github/workflows/flutter-deploy.yml'
  workflow_dispatch:

jobs:
  # Shared validation and analysis (quick, cheap)
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
          cache-key: ${{ runner.os }}-flutter-${{ hashFiles('flutter/pubspec.lock') }}

      - name: Get dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Run code analysis
        working-directory: flutter
        run: flutter analyze

      - name: Check code formatting
        working-directory: flutter
        run: dart format --set-exit-if-changed .

      - name: Run tests
        working-directory: flutter
        run: flutter test

  # iOS build - ships to TestFlight
  build-ios:
    needs: validate
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Apple requires apps be built with the iOS 26 SDK (Xcode 26+) for
      # App Store Connect uploads. Select the newest Xcode 26 explicitly.
      - name: Select Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true
          cache-key: ${{ runner.os }}-flutter-ios-${{ hashFiles('flutter/pubspec.lock') }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.5'
          bundler-cache: true
          working-directory: flutter/ios

      - name: Install Fastlane
        working-directory: flutter/ios
        run: |
          if ! gem list -i fastlane > /dev/null; then
            gem install fastlane
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: flutter/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('flutter/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache iOS Build
        uses: actions/cache@v4
        with:
          path: |
            flutter/ios/Pods/Flutter/Flutter.xcframework
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-ios-build-${{ hashFiles('flutter/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ios-build-

      - name: Setup App Store Connect API
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${{ vars.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Build and upload to TestFlight
        working-directory: flutter/ios
        run: |
          export FASTLANE_API_KEY_PATH="${HOME}/.appstoreconnect/private_keys/AuthKey_${{ vars.APP_STORE_CONNECT_KEY_ID }}.p8"
          fastlane deploy
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: "${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}"
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}

  # Android build - DISABLED for now (iOS-first; Android is deferred per RLY-103).
